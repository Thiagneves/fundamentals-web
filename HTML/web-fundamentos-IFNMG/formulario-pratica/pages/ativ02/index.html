<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 02</title>
</head>
<body>
    <h1>Cadastro:</h1>
    <form action="" method="post">
        <label for="nome">Nome completo: </label>
        <input type="text" id="nome" name="nome">
        
        <br><br>
        <label for="idade">Idade: </label>
        <input type="number" id="idade" name="idade">

        <br><br>
        <label for="e-mail">E-mail: </label>
        <input type="email" id="e-mail" name="e-mail" required>

        <br><br>
        <label for="telefone">Telefone: </label>
        <input type="tel" id="telefone" name="telefone">

        <br><br>
        <label for="curso">Curso desejado: </label>
        <select name="curso" id="curso">
            <option value="ads">Análise e Desenvolvimento de Sistemas</option>
            <option value="eng-soft">Engenharia de Software</option>
            <option value="cie-comp">Ciência da Computação</option>
            <option value="gest-tec">Gestão em Tecnólogia</option>
        </select>

        <br><br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
